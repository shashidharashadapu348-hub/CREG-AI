name: deploy

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show repository structure
        run: |
          echo "Repository contents:"
          ls -la
          echo ""
          echo "Source tree:"
          find . -type f -not -path './node_modules/*' -not -path './.git/*' -not -path './dist/*' -not -path './docs/*' | head -100

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Backend Dependencies
        run: |
          if [ -d "supabase/functions" ]; then
            echo "Supabase edge functions detected (Deno runtime - no install required)."
          else
            echo "No backend directory found - skipping."
          fi

      - name: Run Backend Tests
        run: |
          if [ -d "supabase/functions" ]; then
            echo "Edge functions present. Skipping runtime tests in deploy workflow."
          else
            echo "No backend tests to run."
          fi

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Run Frontend Tests
        run: npm test --if-present

      - name: Build React App
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}

      - name: Add SPA fallback (404.html)
        run: cp dist/index.html dist/404.html

      - name: Publish build to docs folder on main
        run: |
          rm -rf docs
          mkdir -p docs
          cp -R dist/* docs/
          touch docs/.nojekyll

      - name: Commit docs update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No deploy changes to commit"
            exit 0
          fi
          git commit -m "deploy: update docs [skip ci]"
          git push origin main
